services:
  scraper-football:
    build: .
    container_name: m3u8_scraper_football
    ports:
      - "${PORT:-3000}:3000"
    restart: unless-stopped
    mem_limit: 768m
    environment:
      HOST: "0.0.0.0"
      PORT: "3000"
      CRON_SCHEDULE: "*/30 * * * *"
      HEADLESS: "true"
      TIMEOUT_MS: "45000"
      NODE_OPTIONS: "--unhandled-rejections=warn"
    volumes:
      - ./server_link/football:/app/server_link/football
      - ./vietanh.m3u:/app/vietanh.m3u
    command: ["node", "index.js", "serve", "3000"]
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s

  scraper-film:
    build: .
    container_name: m3u8_scraper_film
    ports:
      - "${FILM_PORT:-3001}:3001"
    restart: unless-stopped
    mem_limit: 768m
    depends_on:
      - scraper-football
    environment:
      HOST: "0.0.0.0"
      FILM_PORT: "3001"
      FILM_OUTPUT_DIR: "/data/film"
      FILM_TIMEOUT_MS: "120000"
      FILM_COLLECT_MS: "1500"
      FILM_MATCH_TIMEOUT_MS: "900000"
      HEADLESS: "true"
      FILM_HEADLESS: "true"
      NODE_OPTIONS: "--unhandled-rejections=warn"
    volumes:
      - ./server_link/phim:/app/server_link/phim
      - film_data:/data/film
    command: ["node", "film-index.js", "serve", "3001"]
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 45s
      timeout: 15s
      retries: 5
      start_period: 120s

volumes:
  film_data:
