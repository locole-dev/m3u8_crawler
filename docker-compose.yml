version: '3.8'

services:
  scraper-football:
    build: .
    container_name: m3u8_scraper_football
    ports:
      - "${PORT:-3000}:3000"
    restart: unless-stopped
    environment:
      HOST: "0.0.0.0"
      PORT: "3000"
      CRON_SCHEDULE: "*/30 * * * *"
      SERVE_SUBCOMMAND: list
      TARGET_URL: "https://cauthutv.cc/"
      HEADLESS: "false"
      TIMEOUT_MS: "45000"
    volumes:
      - ./server_link/football:/app/server_link/football
      - ./vietanh.m3u:/app/vietanh.m3u
    command: >
      xvfb-run --auto-servernum "--server-args=-screen 0 1366x768x24"
      node index.js serve 3000 "${CRON_SCHEDULE:-*/30 * * * *}"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  scraper-film:
    build: .
    container_name: m3u8_scraper_film
    ports:
      - "${FILM_PORT:-3001}:3001"
    restart: unless-stopped
    environment:
      HOST: "0.0.0.0"
      FILM_PORT: "3001"
      FILM_TIMEOUT_MS: "120000"
      FILM_COLLECT_MS: "1500"
      HEADLESS: "false"
    volumes:
      - ./server_link/phim:/app/server_link/phim
    command: >
      xvfb-run --auto-servernum "--server-args=-screen 0 1366x768x24"
      node film-index.js serve 3001
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s
