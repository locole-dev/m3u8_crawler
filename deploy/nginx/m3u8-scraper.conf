# Nginx reverse proxy for m3u8_scraper
# Install: sudo cp deploy/nginx/m3u8-scraper.conf /etc/nginx/sites-available/m3u8-scraper
# Enable:  sudo ln -sf /etc/nginx/sites-available/m3u8-scraper /etc/nginx/sites-enabled/
# Test:    sudo nginx -t && sudo systemctl reload nginx

upstream m3u8_football {
    server 127.0.0.1:3000;
    keepalive 8;
}

upstream m3u8_film {
    server 127.0.0.1:3001;
    keepalive 8;
}

server {
    listen 80;
    server_name example.com;

    client_max_body_size 1m;

    location / {
        proxy_pass http://m3u8_football;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name film.example.com;

    client_max_body_size 1m;
    proxy_read_timeout 300s;

    location / {
        proxy_pass http://m3u8_film;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
